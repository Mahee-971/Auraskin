<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBkXa1g7xtFNQv2AbH5I5DC-HJICs-ZC8",
  authDomain: "aura-skin-c93f3.firebaseapp.com",
  databaseURL: "https://aura-skin-c93f3-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "aura-skin-c93f3",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── ADMIN ──
let ADMIN = { user: "admin", pass: "admin123" };

// 🔥 REALTIME ADMIN SYNC (FIXED)
onValue(ref(db, "adminCredentials"), snap => {
  if (snap.exists()) {
    ADMIN = snap.val();
    console.log("✅ ADMIN UPDATED:", ADMIN);
  }
});

// ── LOGIN ──
function doLogin() {
  const u = loginUser.value.trim();
  const p = loginPass.value.trim();

  if (u === ADMIN.user && p === ADMIN.pass) {
    loginOverlay.style.display = "none";
    appDiv.style.display = "block";
    initApp();
  } else {
    loginError.style.display = "block";
    loginPass.value = "";
  }
}
window.doLogout = function () {
  loginOverlay.style.display = "flex";
  appDiv.style.display = "none";
  loginUser.value = "";
  loginPass.value = "";
};

loginBtn.onclick = doLogin;
loginPass.onkeydown = e => e.key === "Enter" && doLogin();
loginUser.onkeydown = e => e.key === "Enter" && doLogin();

// ── INIT ──
function initApp() {
  currentDate.textContent = new Date().toLocaleDateString();
  listenProducts();
}

// ── PRODUCTS ──
let allProducts = {};

function listenProducts() {
  onValue(ref(db, "products"), snap => {
    allProducts = snap.val() || {};
    renderProducts();
  });
}

function renderProducts() {
  const tbody = productsBody;
  const list = Object.values(allProducts);

  if (!list.length) {
    tbody.innerHTML = "<tr><td colspan='5'>No products</td></tr>";
    return;
  }

  tbody.innerHTML = list.map(p => `
    <tr>
      <td>${p.name}</td>
      <td>$${p.price}</td>
      <td>${p.status}</td>
      <td>
        <button onclick="editProduct('${p.id}')">Edit</button>
        <button onclick="deleteProduct('${p.id}')">Delete</button>
      </td>
    </tr>
  `).join("");
}

// ── SAVE PRODUCT ──
window.saveProduct = async function () {
  const id = editId.value || Date.now().toString();

  const data = {
    id,
    name: editName.value,
    price: editPrice.value,
    status: editStatus.value
  };

  await set(ref(db, "products/" + id), data);
  alert("Saved");
};

// ── DELETE ──
window.deleteProduct = async function (id) {
  await remove(ref(db, "products/" + id));
};

// ── 🔥 FIXED PASSWORD UPDATE ──
window.saveAdmin = async function () {
  const u = adminUser.value.trim();
  const p = adminPass.value.trim();

  if (!u) {
    alert("Username required");
    return;
  }

  const newCreds = {
    user: u,
    pass: p ? p : ADMIN.pass
  };

  console.log("💾 Saving:", newCreds);

  try {
    await set(ref(db, "adminCredentials"), newCreds);

    ADMIN = newCreds;

    adminPass.value = "";

    alert("✅ Updated! Please login again");

    // 🔥 FORCE LOGOUT
    setTimeout(() => {
      doLogout();
    }, 500);

  } catch (err) {
    console.error(err);
    alert("Error saving");
  }
};
</script>
